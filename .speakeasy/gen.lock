    speakeasy-default-v3-token-request:
      requestBody:
        application/x-www-form-urlencoded: {"client_id": "customer_id", "client_secret": "secret", "grant_type": "client_credentials"}
      responses:
        "200":
          application/json: {"access_token": "eyJ...", "expires_in": 3600, "refresh_expires_in": 3600, "refresh_token": "eyJ...", "token_type": "Bearer"}
        "400":
          application/json: {"code": 1001, "message": "invalid request"}
        "401":
          application/json: {"code": 8002, "message": "not authorized"}
        "500":
          application/json: {"code": 1000, "message": "error occurred"}
